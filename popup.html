<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>__MSG_title__</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1 data-i18n="title">ChatGPT History Cleaner</h1>
      <span id="currentRounds" class="current-rounds-badge"></span>
    </div>
    <div class="settings-section">
      <div class="rounds-row">
        <label for="keepRounds" data-i18n="keepRoundsLabel">保留最近：</label>
        <input type="number" id="keepRounds" min="1" max="100" value="10" />
        <span class="input-hint" data-i18n="roundsUnit">轮</span>
      </div>
      <div class="checkbox-group">
        <label class="checkbox-label">
          <input type="checkbox" id="autoMaintain" />
          <span class="checkbox-text" data-i18n="autoMaintainLabel">自动保持轮数上限</span>
        </label>
      </div>
    </div>
    <div class="button-group">
      <button id="removeOldRounds" class="btn btn-primary" data-i18n="cleanButton">
        🧹 清理历史对话
      </button>
    </div>
    <div id="status" class="status"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
